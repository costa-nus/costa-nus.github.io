<?xml version="1.0" encoding="UTF-8"?>
<!--
  Thumbnail forged from the visual content of
  https://costa-nus.github.io/ai-on-cs-edu/

  Two ascending index lines (BS enrollment, PhD enrollment) with a vertical
  accent marker at the ChatGPT release (Nov 2022). Lab palette throughout.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img"
     aria-label="Two ascending CS enrollment lines with a ChatGPT moment marker">
  <rect width="480" height="360" fill="#ece4d3"/>

  <!-- Subtle horizontal gridlines -->
  <g stroke="#003D7C" stroke-opacity="0.08" stroke-width="1">
    <line x1="40" y1="100" x2="440" y2="100"/>
    <line x1="40" y1="170" x2="440" y2="170"/>
    <line x1="40" y1="240" x2="440" y2="240"/>
    <line x1="40" y1="310" x2="440" y2="310"/>
  </g>

  <!-- Baseline -->
  <line x1="40" y1="310" x2="440" y2="310" stroke="#003D7C" stroke-opacity="0.18" stroke-width="1"/>

  <!-- "ChatGPT moment" vertical marker -->
  <line x1="288" y1="46" x2="288" y2="310" stroke="#EF7C00" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="288" y="38"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="10" font-weight="600" fill="#EF7C00"
        text-anchor="middle" letter-spacing="1.5">GPT · 11·2022</text>

  <!-- BS enrollment line — sharper post-2022 ascent -->
  <polyline points="40,278 90,272 140,266 190,258 240,248 288,232 340,178 390,138 440,108"
            fill="none" stroke="#003D7C" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="440" cy="108" r="4" fill="#003D7C"/>
  <text x="436" y="100"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9" font-weight="600" fill="#003D7C"
        text-anchor="end" letter-spacing="1.2">BACHELOR'S</text>

  <!-- PhD enrollment line — milder ascent -->
  <polyline points="40,300 90,298 140,296 190,294 240,290 288,284 340,260 390,238 440,218"
            fill="none" stroke="#003D7C" stroke-opacity="0.5" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="440" cy="218" r="3.5" fill="#003D7C" fill-opacity="0.6"/>
  <text x="436" y="234"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9" font-weight="500" fill="#003D7C" fill-opacity="0.65"
        text-anchor="end" letter-spacing="1.2">PhD</text>

  <!-- "+22%" callout — top-left, big editorial number -->
  <text x="40" y="84"
        font-family="'Inter Tight', Inter, sans-serif"
        font-size="42" font-weight="700" fill="#003D7C"
        letter-spacing="-2">+22<tspan font-size="32">%</tspan></text>
  <text x="40" y="106"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9" font-weight="500" fill="#003D7C" fill-opacity="0.6"
        letter-spacing="1.5">BS ENROLLMENT · AY19–20 → 22–23</text>
</svg>
