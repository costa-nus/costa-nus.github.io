<body>
<div id="root"></div>

<!-- Content data — plain JS, loads synchronously so window.* is populated before Babel runs the section files. -->
<script src="../data/blogs.js"></script>

<!-- Section components — _shared first so other files can pull tokens off window. -->
<script type="text/babel" src="../site/_shared.jsx"></script>
<script type="text/babel" src="../site/nav.jsx"></script>
<script type="text/babel" src="../site/blogs.jsx"></script>
<script type="text/babel" src="../site/footer.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <>
        <Nav basePath="/" />
        <Blogs />
        <Footer basePath="/" />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
