<!--
  Favicon version of the WaveMark logo (site/_shared.jsx). Same geometry,
  but strokes are thickened (3/4 -> 7/9) so the waves stay legible at 16px
  tab size. Colors are a third copy of the palette — keep in sync with `C`
  in site/_shared.jsx and the CSS variables in css/site.css:
    ink #003D7C, paper #f5f1ea, accent #EF7C00
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <rect width="96" height="96" rx="20" fill="#003D7C" />
  <path d="M 14 34 Q 28 28 42 34 T 66 34 T 86 34" fill="none" stroke="#f5f1ea" stroke-width="7" stroke-linecap="round" />
  <path d="M 14 52 Q 28 46 42 52 T 66 52 T 86 52" fill="none" stroke="#EF7C00" stroke-width="9" stroke-linecap="round" />
  <path d="M 14 70 Q 28 64 42 70 T 66 70 T 86 70" fill="none" stroke="#f5f1ea" stroke-width="7" stroke-linecap="round" />
</svg>
