<?xml version="1.0" encoding="UTF-8"?>
<!--
  Thumbnail forged from the visual content of
  https://costa-nus.github.io/ai-on-cs-edu/

  Three zones, strictly separated:
    1. Editorial callout (upper-left): mono kicker + big +22% number.
    2. Chart (full width): two ascending lines, BS prominent, PhD muted.
    3. Marker label (under baseline): mono "ChatGPT · NOV 2022".

  Hierarchy is conveyed by line weight + opacity, not by redundant
  end-of-line labels. Layout safe under 16:9 mobile crop (y ∈ [45, 315]).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img"
     aria-label="Bachelor's and PhD CS enrollment ascending after ChatGPT, +22% callout">
  <rect width="480" height="360" fill="#ece4d3"/>

  <!-- Zone 1 — editorial callout, upper-left -->
  <text x="40" y="82"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="10" font-weight="600" fill="#003D7C" fill-opacity="0.55"
        letter-spacing="2">BACHELOR'S CS</text>
  <text x="40" y="142"
        font-family="'Inter Tight', Inter, sans-serif"
        font-size="56" font-weight="700" fill="#003D7C"
        letter-spacing="-2.5">+22<tspan font-size="40">%</tspan></text>

  <!-- Zone 2 — chart. Marker drawn first so lines render on top. -->
  <line x1="288" y1="172" x2="288" y2="288"
        stroke="#EF7C00" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- PhD line, subordinated (drawn first, behind BS) -->
  <polyline points="40,284 160,280 288,272 380,250 440,228"
            fill="none" stroke="#003D7C" stroke-opacity="0.32" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- BS line, prominent -->
  <polyline points="40,258 160,250 288,236 380,180 440,150"
            fill="none" stroke="#003D7C" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Zone 3 — marker label, sitting below the chart baseline -->
  <text x="288" y="308"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="10" font-weight="600" fill="#EF7C00"
        text-anchor="middle" letter-spacing="2">ChatGPT · NOV 2022</text>
</svg>
